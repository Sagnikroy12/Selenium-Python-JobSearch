name: Daily Job Matcher

on:
  schedule:
    # 07:00 AM Asia/Kolkata is 01:30 UTC.
    # - cron: "30 1 * * *"
    - cron: "30 12 * * *"
  # push:
  #   branches:
  #     - main
  #     - dev
  workflow_dispatch:
    inputs:
      resume_pdf_path:
        description: "Resume PDF path inside the repository or mounted workspace"
        required: false
        default: "Sagnik_Roy_SDET_Resume_28-05-2026.pdf"
      job_title_target:
        description: "Job title or keyword search target"
        required: false
        default: "Automation Engineer"
      job_location_target:
        description: "Job location search target"
        required: false
        default: "Hyderabad"
      recipient_email:
        description: "Email address that receives the top 10 match report"
        required: false
        default: "morphgamingstop@gmail.com"

jobs:
  run-job-matcher:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare output directories
        run: mkdir -p artifacts reports

      - name: Build Docker image
        run: docker build -t daily-job-matcher .

      - name: Run scraper, ATS matcher, and email report
        env:
          INPUT_RESUME: ${{ inputs.resume_pdf_path }}
          VAR_RESUME: ${{ vars.RESUME_PDF_PATH }}
          INPUT_TITLE: ${{ inputs.job_title_target }}
          VAR_TITLE: ${{ vars.JOB_TITLE_TARGET }}
          INPUT_LOCATION: ${{ inputs.job_location_target }}
          VAR_LOCATION: ${{ vars.JOB_LOCATION_TARGET }}
          INPUT_EMAIL: ${{ inputs.recipient_email }}
          VAR_EMAIL: ${{ vars.RECIPIENT_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
        run: |
          RESUME_PDF_PATH="${INPUT_RESUME:-${VAR_RESUME:-Sagnik_Roy_SDET_Resume_28-05-2026.pdf}}"
          JOB_TITLE_TARGET="${INPUT_TITLE:-${VAR_TITLE:-Automation Engineer}}"
          JOB_LOCATION_TARGET="${INPUT_LOCATION:-${VAR_LOCATION:-Hyderabad}}"
          RECIPIENT_EMAIL="${INPUT_EMAIL:-${VAR_EMAIL:-morphgamingstop@gmail.com}}"
          FINAL_SMTP_PORT="${SMTP_PORT:-587}"
          FINAL_EMAIL_SUBJECT="${EMAIL_SUBJECT:-Daily ATS Job Match Report}"

          docker run --rm \
            -e HEADLESS=true \
            -e RESUME_PDF_PATH="/app/workspace/${RESUME_PDF_PATH}" \
            -e JOB_TITLE_TARGET="${JOB_TITLE_TARGET}" \
            -e JOB_LOCATION_TARGET="${JOB_LOCATION_TARGET}" \
            -e RECIPIENT_EMAIL="${RECIPIENT_EMAIL}" \
            -e SEND_EMAIL=true \
            -e SMTP_HOST="${SMTP_HOST}" \
            -e SMTP_PORT="${FINAL_SMTP_PORT}" \
            -e SMTP_USERNAME="${SMTP_USERNAME}" \
            -e SMTP_PASSWORD="${SMTP_PASSWORD}" \
            -e MAIL_FROM="${MAIL_FROM}" \
            -e EMAIL_SUBJECT="${FINAL_EMAIL_SUBJECT}" \
            -v "${{ github.workspace }}:/app/workspace" \
            -v "${{ github.workspace }}/artifacts:/app/artifacts" \
            -v "${{ github.workspace }}/reports:/app/reports" \
            daily-job-matcher

      - name: Upload scored Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scored-linkedin-jobs
          path: artifacts/linkedin_jobs.xlsx
          if-no-files-found: warn

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-screenshots
          path: reports/
          if-no-files-found: ignore
