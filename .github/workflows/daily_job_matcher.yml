name: Daily Job Matcher

on:
  workflow_dispatch:
    inputs:
      users_payload:
        description: 'JSON string payload of users to process'
        required: false
        type: string
      time_slot:
        description: 'The time slot being processed'
        required: false
        type: string
  repository_dispatch:
    types: [run-for-users]

jobs:
  run-job-matcher:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare output directories
        run: mkdir -p artifacts reports

      - name: Set up Python for orchestrator
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install orchestrator dependencies
        run: |
          pip install gspread google-api-python-client google-auth pandas openpyxl

      - name: Decode Google service account key
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: echo "$GDRIVE_SA_JSON" | base64 -d > /tmp/gdrive_sa.json

      - name: Build Docker image
        run: docker build -t daily-job-matcher .

      - name: Run pipeline for dispatched users
        env:
          GDRIVE_SA_KEY_PATH: /tmp/gdrive_sa.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          # Handle both manual (inputs) and automated (client_payload) triggers
          USERS_PAYLOAD: ${{ github.event.inputs.users_payload || toJson(github.event.client_payload.users) }}
          TIME_SLOT: ${{ github.event.inputs.time_slot || github.event.client_payload.time_slot }}
        run: python scripts/run_for_users.py

      - name: Upload all scored reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-reports-slot-${{ github.event.inputs.time_slot }}
          path: artifacts/*_jobs.xlsx
          if-no-files-found: warn

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: reports/
          if-no-files-found: ignore
