name: Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  test-ats-pipeline:
    runs-on: ubuntu-latest
    name: ATS Pipeline Unit Tests
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ATS pipeline tests
        run: |
          python -m pytest tests/test_ats_pipeline.py -v --tb=short -m unit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ats-test-results
          path: .pytest_cache/
          if-no-files-found: ignore

  test-selenium:
    runs-on: ubuntu-latest
    name: Selenium Integration Tests
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Chrome and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            chromium \
            chromium-driver \
          && sudo ln -sf /usr/bin/chromedriver /usr/bin/chromium-driver \
          && sudo apt-get clean \
          && sudo rm -rf /var/lib/apt/lists/*

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "HEADLESS=true" >> .env
          echo "BROWSER=chrome" >> .env
          echo "CHROME_BIN=/usr/bin/chromium" >> .env
          echo "CHROMEDRIVER_PATH=/usr/bin/chromium-driver" >> .env

      - name: Run Selenium tests
        env:
          HEADLESS: true
          BROWSER: chrome
          CHROME_BIN: /usr/bin/chromium
          CHROMEDRIVER_PATH: /usr/bin/chromium-driver
        run: |
          python -m pytest tests/test_login.py -v --tb=short --timeout=300 -m selenium

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-screenshots
          path: reports/
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint

      - name: Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run pylint
        run: |
          pylint **/*.py --exit-zero --output-format=text || true
